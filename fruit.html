<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fruit Cutter Game</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#87CEEB;
    font-family:Arial,sans-serif;
}

canvas{
    display:block;
    background:linear-gradient(#87CEEB,#d7ffd9);
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
    color:#fff;
    font-size:24px;
    font-weight:bold;
    text-shadow:2px 2px 4px #000;
}

#gameOver{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:white;
    text-align:center;
    display:none;
}

button{
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin-top:20px;
}
</style>
</head>

<body>

<div id="ui">
Score : <span id="score">0</span>
&nbsp;&nbsp;&nbsp;
Lives : <span id="lives">3</span>
</div>

<div id="gameOver">
<h1>Game Over</h1>
<h2 id="finalScore"></h2>
<button onclick="restart()">Play Again</button>
</div>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let fruits=[];
let score=0;
let lives=3;
let mouse={x:0,y:0};
let gameRunning=true;

const emojis=["🍎","🍌","🍉","🍓","🍍","🥝","🍊","🍒"];

class Fruit{

constructor(){

this.x=Math.random()*canvas.width;
this.y=-50;

this.radius=30;

this.speed=2+Math.random()*4;

this.emoji=emojis[Math.floor(Math.random()*emojis.length)];

}

draw(){

ctx.font="50px serif";
ctx.fillText(this.emoji,this.x-20,this.y+20);

}

update(){

this.y+=this.speed;

this.draw();

if(this.y>canvas.height+50){

fruits.splice(fruits.indexOf(this),1);

lives--;

document.getElementById("lives").innerText=lives;

if(lives<=0){

gameOver();

}

}

}

}

function spawnFruit(){

if(gameRunning)

fruits.push(new Fruit());

}

setInterval(spawnFruit,700);

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

fruits.forEach(f=>f.update());

requestAnimationFrame(animate);

}

animate();

function slice(x,y){

for(let i=fruits.length-1;i>=0;i--){

let f=fruits[i];

let dx=x-f.x;

let dy=y-f.y;

let dist=Math.sqrt(dx*dx+dy*dy);

if(dist<40){

fruits.splice(i,1);

score++;

document.getElementById("score").innerText=score;

drawSlash(x,y);

}

}

}

canvas.addEventListener("mousemove",e=>{

mouse.x=e.clientX;
mouse.y=e.clientY;

slice(mouse.x,mouse.y);

});

canvas.addEventListener("touchmove",e=>{

let touch=e.touches[0];

slice(touch.clientX,touch.clientY);

});

function drawSlash(x,y){

ctx.beginPath();

ctx.moveTo(x-40,y-40);

ctx.lineTo(x+40,y+40);

ctx.strokeStyle="white";

ctx.lineWidth=5;

ctx.stroke();

}

function gameOver(){

gameRunning=false;

document.getElementById("gameOver").style.display="block";

document.getElementById("finalScore").innerHTML="Score : "+score;

}

function restart(){

score=0;

lives=3;

fruits=[];

gameRunning=true;

document.getElementById("score").innerText=0;

document.getElementById("lives").innerText=3;

document.getElementById("gameOver").style.display="none";

}

window.onresize=()=>{

canvas.width=window.innerWidth;

canvas.height=window.innerHeight;

}

</script>

</body>
</html>
