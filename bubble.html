<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Bubble Smash Game</title>
    link rel="stylesheet" href="<bubble class="j"></bubble>s">

    <style>
        /* CSS Styling and Layout */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #1a1c29, #0e1017);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #fff;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            cursor: crosshair;
        }

        /* Top Status Bar */
        #status-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
            z-index: 10;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        #score-display { color: #4effa3; }
        #timer-display { color: #ff4e4e; }

        /* Start / Game Over Overlay Screens */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(14, 16, 23, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            transition: opacity 0.3s ease;
        }

        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #4ef7ff, #ff4eff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #aaa;
        }

        .btn {
            padding: 12px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(135deg, #0072ff, #00c6ff);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 114, 255, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 114, 255, 0.6);
        }

        /* Bubble Element Styles */
        .bubble {
            position: absolute;
            bottom: -100px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.7), rgba(255,255,255,0.1) 40%, rgba(0,0,0,0.4));
            box-shadow: inset 0 0 20px rgba(255,255,255,0.5), 0 10px 20px rgba(0,0,0,0.2);
            animation: floatUp linear forwards;
            cursor: pointer;
            will-change: transform;
        }

        /* Pop Animation Effect */
        .bubble.popping {
            animation: popOut 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards !important;
            pointer-events: none;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) translateX(0);
            }
            50% {
                transform: translateY(-50vh) translateX(20px);
            }
            100% {
                transform: translateY(-110vh) translateX(-10px);
            }
        }

        @keyframes popOut {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            100% {
                transform: scale(1.6);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Live Information Bar -->
        <div id="status-bar">
            <div class="stat-box">Score: <span id="score-display">0</span></div>
            <div class="stat-box">Time: <span id="timer-display">60</span>s</div>
        </div>

        <!-- Start Screen Panel -->
        <div id="start-screen" class="overlay">
            <h1>BUBBLE SMASH</h1>
            <p>Smash as many bubbles as you can before the timer runs out!</p>
            <button class="btn" id="start-btn">Start Game</button>
        </div>

        <!-- Game Over Screen Panel -->
        <div id="game-over-screen" class="overlay hidden">
            <h1>GAME OVER</h1>
            <p>Your Final Score: <span id="final-score" style="color:#4effa3; font-weight:bold;">0</span></p>
            <button class="btn" id="restart-btn">Play Again</button>
        </div>
    </div>

    <script>
        // JavaScript Game Engine Game Logic Variables
        const gameContainer = document.getElementById('game-container');
        const scoreDisplay = document.getElementById('score-display');
        const timerDisplay = document.getElementById('timer-display');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScore = document.getElementById('final-score');
        
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');

        let score = 0;
        let timeLeft = 60;
        let isGameRunning = false;
        let bubbleInterval;
        let countdownInterval;

        // Color palettes for neon styled random bubbles
        const colors = [
            'rgba(0, 242, 254, 0.4)',  // Neon Blue
            'rgba(253, 56, 161, 0.4)',  // Neon Pink
            'rgba(46, 213, 115, 0.4)',  // Neon Green
            'rgba(255, 159, 67, 0.4)',  // Neon Orange
            'rgba(189, 4, 254, 0.4)'    // Neon Purple
        ];

        // Core Event Handlers
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        function startGame() {
            // Setup Initial Conditions
            score = 0;
            timeLeft = 60;
                        isGameRunning = true;
            scoreDisplay.textContent = score;
            timerDisplay.textContent = timeLeft;

            // Manage Layer Visibilities
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');

            // Clean up any remaining bubbles left from a previous match
            document.querySelectorAll('.bubble').forEach(b => b.remove());

            // Run core loops
            bubbleInterval = setInterval(spawnBubble, 450); // Generates a bubble every 450ms
            countdownInterval = setInterval(updateTimer, 1000);
        }

        function updateTimer() {
            timeLeft--;
            timerDisplay.textContent = timeLeft;

            if (timeLeft <= 0) {
                endGame();
            }
        }

        function spawnBubble() {
            if (!isGameRunning) return;

            const bubble = document.createElement('div');
            bubble.classList.add('bubble');

            // Compute dynamic random metrics for unique variations
            const size = Math.floor(Math.random() * 50) + 40; // Sizes between 40px and 90px
            const randomX = Math.random() * (gameContainer.clientWidth - size);
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            const speed = Math.random() * 3 + 2; // Flight durations between 2 and 5 seconds

            // Inject custom layout values
            bubble.style.width = `${size}px`;
            bubble.style.height = `${size}px`;
            bubble.style.left = `${randomX}px`;
            bubble.style.backgroundColor = randomColor;
            bubble.style.border = `2px solid ${randomColor.replace('0.4', '1')}`;
            bubble.style.animationDuration = `${speed}s`;

            // Interaction Handler
            bubble.addEventListener('mousedown', (e) => {
                smashBubble(bubble);
            });

            // Prevent touch lag on mobile layouts
            bubble.addEventListener('touchstart', (e) => {
                e.preventDefault(); 
                smashBubble(bubble);
            });

            // Remove elements when they naturally drift out of view to avoid browser memory leaks
            bubble.addEventListener('animationend', () => {
                bubble.remove();
            });

            gameContainer.appendChild(bubble);
        }

        function smashBubble(bubble) {
            if (!isGameRunning || bubble.classList.contains('popping')) return;

            // Trigger structural changes
            bubble.classList.add('popping');
            score += 10;
            scoreDisplay.textContent = score;

            // Remove the bubble wrapper element once the CSS 'popOut' animation concludes
            setTimeout(() => {
                bubble.remove();
            }, 150);
        }

        function endGame() {
            isGameRunning = false;
            clearInterval(bubbleInterval);
            clearInterval(countdownInterval);}
